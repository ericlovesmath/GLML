<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLML Playground</title>
  <style>
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
  </style>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="icon" href="data:image/png;base64,iVBORw0KGgo=">
  <script defer src="/main.bc.js"></script>
  <script defer type="module" src="/src/main.ts"></script>
</head>

<body>
  <div id="app"></div>
  <header>
    <h3>GLML Playground</h3>
    <div class="header-links">
      <a href="https://www.glml-lang.com/" target="_blank" rel="noopener noreferrer">Docs</a>
      <a href="https://github.com/glml-lang/GLML" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
        <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
        </svg>
      </a>
    </div>
  </header>
  <div class="main-layout">

    <div class="pane glml-pane">

      <div class="pane-header">
        <span>GLML</span>
        <select id="example-select"></select>
        <label class="vim-toggle">
          <input type="checkbox" id="vim-toggle" /> Vim
        </label>
        <button id="compile-btn">Compile</button>
      </div>

      <div id="glml-input"></div>
      <div id="vim-status"></div>
    </div>

    <div class="right-column">

      <div class="webgl-pane">
        <div class="pane-header"><span>WebGL Output</span></div>
        <div class="canvas-container">
          <canvas id="gl-canvas"></canvas>
        </div>
      </div>

      <div class="pane glsl-pane">
        <div class="pane-header"><span>GLSL Output</span></div>
        <div class="textarea-wrapper">
          <div id="glsl-output"></div>
          <p id="error-output"></p>
        </div>
      </div>

    </div>

  </div>
</body>

</html>
